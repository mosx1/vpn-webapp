# Скопируйте в config.ini на сервере (рядом с docker-compose.yml) и заполните значения.
# Файл config.ini в git не коммитится (*.ini в .gitignore).

[BaseConfig]
host = 0.0.0.0
coefficient_load_servers = 4.0

[Postgres]
dbname = postgres
user = postgres
password = CHANGEME
host = db.example.com
port = 5432

[JWT]
algoritm = HS256

[YooMoney]
WALLET_YOOMONEY_ID =
token =

[Price]
RUB = 130

[AmneziaWG]
login =
password =

[3xUI]
username =
password =
inbound_id = 1
# Формат ссылки, которая сохраняется в users_subscription.server_link
# Доступные плейсхолдеры: {base_url}, {sub_id}, {user_id}, {server_id}
subscription_template = {base_url}/sub/{sub_id}
# Для VLESS/VMess обычно id, для Trojan password, для Shadowsocks email
client_id_field = id

[YandexMail]
smtp_host = smtp.yandex.ru
smtp_port = 465
login =
password =
from_email =
from_name =
use_ssl = true
use_tls = false

[YandexEmail]
host = smtp.yandex.ru
port = 465
login =
password =
sender_email =
sender_name =
use_ssl = true
use_tls = false
timeout = 10
