# Образ задаётся при деплое: DEPLOY_IMAGE=ghcr.io/owner/repo:<sha>
# Локально: export DEPLOY_IMAGE=ghcr.io/owner/repo:latest && docker compose up
#
# config.ini на сервере положите рядом с compose (scp с локальной машины).
# Путь на хосте: CONFIG_INI_HOST=/path/to/config.ini
# Если файла не было, Docker мог создать ПАПКУ config.ini — удалите её: rm -rf ./config.ini
#
# Альтернатива: уберите volume — тогда entrypoint скопирует config.example.ini в config.ini
# (нужно заполнить секреты внутри контейнера или смонтировать свой файл).

services:
  web:
    image: ${DEPLOY_IMAGE:?set DEPLOY_IMAGE to ghcr.io/owner/repo:tag}
    ports:
      - "${APP_PORT:-8000}:8000"
    restart: unless-stopped
    volumes:
      - ${CONFIG_INI_HOST:-./config.ini}:/vpn-webapp/config.ini:ro
