# Образ задаётся при деплое: DEPLOY_IMAGE=ghcr.io/owner/repo:<sha>
# Локально: export DEPLOY_IMAGE=ghcr.io/owner/repo:latest && docker compose up
#
# config.ini в git не попадает; на сервере положите config.ini рядом с этим файлом
# (как при деплое: DEPLOY_PATH — там же docker compose pull && up).
# Монтируется ${CONFIG_INI_HOST:-./config.ini} относительно каталога compose.
#
# Если файла не было при первом up, Docker мог создать ПАПКУ config.ini — удалите:
#   rm -rf ./config.ini && cp config.example.ini config.ini && nano config.ini
# Без volume (только образ): закомментируйте volumes ниже — entrypoint скопирует example в контейнер.

services:
  web:
    image: ${DEPLOY_IMAGE:?set DEPLOY_IMAGE to ghcr.io/owner/repo:tag}
    ports:
      - "${APP_PORT:-8000}:8000"
    restart: unless-stopped
    volumes:
      - ${CONFIG_INI_HOST:-./config.ini}:/vpn-webapp/config.ini:ro
