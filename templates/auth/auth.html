<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <title>Регистрация — VPN</title>
    <style>
        :root {
            --font: "DM Sans", system-ui, -apple-system, sans-serif;
            --text: #0f172a;
            --text-muted: #64748b;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --border: rgb(148 163 184 / 0.22);
            --primary: #dc2626;
            --primary-dark: #b91c1c;
            --primary-glow: rgb(220 38 38 / 0.35);
            --link: #2563eb;
            --radius: 16px;
            --radius-sm: 12px;
            --shadow-lg: 0 4px 6px -1px rgb(15 23 42 / 0.06),
                0 16px 32px -8px rgb(15 23 42 / 0.12);
            --shadow-inner: inset 0 1px 0 rgb(255 255 255 / 0.6);
        }
        *, *::before, *::after { box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: var(--font);
            background: fixed radial-gradient(1200px 800px at 80% -10%, rgb(239 246 255 / 0.9), transparent),
                radial-gradient(900px 600px at -10% 40%, rgb(254 226 226 / 0.45), transparent),
                linear-gradient(180deg, #f1f5f9 0%, #e8eef5 100%);
            margin: 0;
            min-height: 100dvh;
            padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
                max(24px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
            color: var(--text);
            line-height: 1.6;
            letter-spacing: -0.01em;
        }
        .container {
            width: 100%;
            max-width: min(100%, 520px);
            margin-left: auto;
            margin-right: auto;
            margin-top: clamp(12px, 3vw, 32px);
            margin-bottom: clamp(12px, 3vw, 32px);
            background: var(--surface);
            border-radius: clamp(14px, 3vw, 22px);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgb(255 255 255 / 0.8);
            padding: clamp(20px, 5vw, 40px) clamp(16px, 4vw, 32px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #f97316, var(--primary-dark));
            opacity: 0.95;
        }
        .container h1 {
            color: var(--text);
            font-size: clamp(1.35rem, 4vw, 1.85rem);
            font-weight: 700;
            margin: 0 0 0.5rem;
            letter-spacing: -0.03em;
        }
        .container p.lead {
            margin: 0 0 1.25rem;
            max-width: 48ch;
            margin-left: auto;
            margin-right: auto;
            font-size: clamp(0.9rem, 2.3vw, 0.98rem);
            color: var(--text-muted);
        }
        .hero-img {
            border: 0;
            width: 100%;
            max-width: 280px;
            height: auto;
            margin: 0 auto 1.25rem;
            display: block;
            border-radius: var(--radius);
            box-shadow: 0 8px 30px rgb(15 23 42 / 0.1);
        }
        .step-panel {
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: clamp(18px, 4vw, 26px) clamp(14px, 3vw, 20px);
            margin: clamp(14px, 3vw, 20px) 0;
            box-shadow: var(--shadow-inner);
            text-align: center;
        }
        .step-panel h2 {
            font-size: clamp(1rem, 2.6vw, 1.15rem);
            font-weight: 600;
            margin: 0 0 1rem;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .register-form {
            max-width: 320px;
            margin: 0 auto;
            text-align: left;
        }
        .form-field {
            margin-bottom: 14px;
        }
        .form-field label {
            display: block;
            font-size: clamp(0.82rem, 2.1vw, 0.9rem);
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .form-field input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: clamp(0.95rem, 2.4vw, 1.02rem);
            background: #fff;
            color: var(--text);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .form-field input::placeholder {
            color: rgb(148 163 184 / 0.9);
        }
        .form-field input:focus {
            outline: none;
            border-color: rgb(220 38 38 / 0.45);
            box-shadow: 0 0 0 3px rgb(220 38 38 / 0.12);
        }
        .register-step {
            display: none;
        }
        .register-step.is-active {
            display: block;
        }
        .form-error {
            margin: 0 0 14px;
            padding: 10px 12px;
            font-size: clamp(0.82rem, 2.1vw, 0.9rem);
            color: #b91c1c;
            background: rgb(254 226 226 / 0.45);
            border: 1px solid rgb(248 113 113 / 0.35);
            border-radius: var(--radius-sm);
            line-height: 1.45;
        }
        .form-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
            align-items: stretch;
        }
        .form-actions .button {
            flex: 1 1 calc(50% - 5px);
            min-width: min(100%, 130px);
            width: auto;
            margin-top: 0;
        }
        @media (max-width: 480px) {
            .form-actions .button {
                flex: 1 1 100%;
            }
        }
        button.button,
        a.button {
            touch-action: manipulation;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            min-height: 46px;
            padding: 12px clamp(14px, 3vw, 22px);
            border-radius: 999px;
            font-weight: 600;
            font-size: clamp(0.92rem, 2.4vw, 1.02rem);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }
        button.button {
            width: 100%;
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: linear-gradient(145deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            box-shadow: 0 4px 14px var(--primary-glow);
        }
        .form-actions button.button {
            width: auto;
        }
        a.button.button--secondary,
        button.button.button--secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-inner);
            text-decoration: none;
        }
        button.button:focus-visible,
        a.button:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 3px;
        }
        @media (min-width: 481px) {
            button.button:hover:not(:disabled) {
                filter: brightness(1.05);
                transform: translateY(-2px);
                box-shadow: 0 8px 24px var(--primary-glow);
            }
            a.button.button--secondary:hover,
            button.button.button--secondary:hover:not(:disabled) {
                background: rgb(248 250 252);
                border-color: rgb(148 163 184 / 0.4);
                transform: translateY(-2px);
                box-shadow: 0 4px 14px rgb(15 23 42 / 0.08);
            }
        }
        button.button:active:not(:disabled),
        a.button:active {
            transform: translateY(0);
        }
        .back-link {
            margin-top: 1rem;
            font-size: clamp(0.88rem, 2.2vw, 0.95rem);
            text-align: center;
        }
        .back-link a {
            color: var(--link);
            font-weight: 500;
            text-decoration: none;
            border-bottom: 1px solid rgb(37 99 235 / 0.35);
        }
        .back-link a:hover {
            border-bottom-color: var(--link);
            color: #1d4ed8;
        }
        .note {
            color: var(--text-muted);
            font-size: clamp(0.82rem, 2.1vw, 0.92rem);
            margin-top: clamp(22px, 4vw, 32px);
            padding: clamp(14px, 3vw, 18px);
            background: var(--surface-soft);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            line-height: 1.55;
        }
        .note a {
            color: var(--link);
            font-weight: 500;
            text-decoration: none;
            border-bottom: 1px solid rgb(37 99 235 / 0.35);
            word-break: break-word;
        }
        .note a:hover {
            border-bottom-color: var(--link);
            color: #1d4ed8;
        }
        @media (prefers-reduced-motion: reduce) {
            button.button,
            a.button { transition: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="hero-img" src="{{ url_for('static', filename='image/vpn_logo.jpeg') }}" alt="VPN" loading="eager" decoding="async">
        <h1>Авторизация</h1>
        <div class="step-panel">
            <form method="get" action="{{ url_for('auth.confirm_email') }}" class="register-form" autocomplete="on" novalidate>
                <div class="register-step is-active" id="step-email" data-step="1">
                    <div class="form-field">
                        <label for="email">Введите email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            autocomplete="email"
                            inputmode="email"
                            placeholder="you@example.com"
                            value=""
                            required
                        >
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="button">Продолжить</button>
                    </div>
                </div>
            </form>
            <p>На email будет отправлена ссылка на личный кабинет. Сохраните ее у себя в закладках браузера и не передвайте третьим лицам.</p>
        </div>
        <p class="note">
            Вопросы по почте: <a href="mailto:597730754a@gmail.com">597730754a@gmail.com</a>
        </p>
    </div>
</body>
</html>
